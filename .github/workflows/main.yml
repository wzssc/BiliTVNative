name: Build BiliTVNative APK
# 触发规则：推送代码/手动点按钮都能编译
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # 支持页面手动启动编译

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      # 拉取源码（升级v5消除Node20废弃警告）
      - name: Checkout source code
        uses: actions/checkout@v5

      # 配置JDK17，适配Android Compose项目
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 赋予编译脚本执行权限
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 同时编译Release正式包 + Debug测试包
      - name: Build APK (Debug + Release)
        run: ./gradlew assembleDebug assembleRelease

      # 打印所有生成的APK路径，方便排查
      - name: Locate built APK files
        run: find . -name "*.apk"

      # 上传所有模块下全部APK，万能通配符，不用管模块名是app/tv
      - name: Upload compiled APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: BiliTVNative-All-APKs
          path: '*/build/outputs/apk/*/*.apk'
