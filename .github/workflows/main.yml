name: Build BiliTVNative APK
# 修复报错核心：定义触发事件
on:
  # 推送到 main 分支自动编译
  push:
    branches: [ main ]
  # 提交合并请求也编译校验
  pull_request:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取仓库完整代码
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2. 配置 JDK 17（Android Compose 推荐版本）
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. 赋予 gradle 执行权限
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. 执行打包，生成 release 安装包
      - name: Build Release APK
        run: ./gradlew assembleRelease

      # 5. 上传编译好的 APK 到流水线产物（编译完成可下载）
      - name: Upload built APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BiliTVNative-release-apk
          path: app/build/outputs/apk/release/*.apk
